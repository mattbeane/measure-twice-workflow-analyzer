name: tests

# Run the regression-harness on every pull request and on pushes to main.
# Once Matt flips branch protection with this workflow as a required check,
# a PR cannot merge unless these tests pass.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a newer commit lands —
# saves Action minutes during rapid iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run pytest with coverage
        run: uv run pytest --cov=workflow_analyzer --cov-report=term
